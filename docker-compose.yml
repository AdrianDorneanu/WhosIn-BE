services:
  app:
    build:
      context: .
      target: development
    container_name: whos-in-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://whosin:whosin@postgres:5432/whosin?schema=public
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app-node-modules:/app/node_modules
    command: npm run start:dev

  postgres:
    image: postgres:17-alpine
    container_name: whos-in-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: whosin
      POSTGRES_PASSWORD: whosin
      POSTGRES_DB: whosin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whosin -d whosin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app-node-modules:
  postgres-data:
